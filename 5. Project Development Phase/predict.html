<!DOCTYPE html>
<html>

<head>
    <title>Prediction</title>
</head>

<body>

<h1>Loan Eligibility Prediction</h1>

<form action="/predict" method="POST">

<label>Name</label>
<br>
<input type="text" name="name" required>

<br><br>

<label>Monthly Income</label>
<br>
<input type="number" name="income" required>

<br><br>

<label>Loan Amount</label>
<br>
<input type="number" name="loan" required>

<br><br>

<label>CIBIL Score</label>
<br>
<input type="number" name="cibil" required>

<br><br>

<button type="submit">
Predict Loan
</button>

</form>


<!-- Result Section -->

{% if prediction %}

<h2>{{ prediction }}</h2>

{% endif %}

<br>

<a href="/history">
<button>View History</button>
</a>

<a href="/">
<button>Home</button>
</a>

</body>
</html>
